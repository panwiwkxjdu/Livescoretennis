<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Tennis Live · Pro</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --text: #eee;
      --text2: #999;
      --accent: #ff6b14;
      --accent-glow: rgba(255,107,20,0.3);
      --blue: #3b82f6;
      --red: #ef4444;
      --green: #22c55e;
      --gold: #f59e0b;
      --radius: 14px;
      --radius-sm: 10px;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);min-height:100vh;min-height:100dvh;display:flex;justify-content:center;align-items:center;color:var(--text);overflow:hidden}
    .app{width:100%;max-width:460px;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
    .screen{display:none;flex:1;flex-direction:column;overflow-y:auto;overflow-x:hidden;padding:12px 16px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
    .screen.active{display:flex}
    .navbar{display:flex;gap:6px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
    .navbar button{background:var(--surface2);border:1px solid var(--border);padding:8px 14px;border-radius:20px;font-weight:600;font-size:0.75rem;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s}
    .navbar button.active{background:var(--accent);color:#000;border-color:var(--accent);box-shadow:0 0 12px var(--accent-glow)}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:0 4px 20px rgba(0,0,0,.5);width:100%}
    .card h2,.card h3{font-weight:700;color:var(--text);margin-bottom:12px;letter-spacing:-0.3px}
    .input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;margin:4px 0;background:var(--surface2);color:var(--text);outline:none;transition:border .2s}
    .input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
    select.input{appearance:none;background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="%23888"><path d="M7 10l5 5 5-5z"/></svg>');background-repeat:no-repeat;background-position:right 12px center}
    .btn{background:var(--surface2);border:1px solid var(--border);padding:12px 20px;border-radius:24px;font-weight:600;font-size:0.88rem;cursor:pointer;color:var(--text);touch-action:manipulation;transition:all .12s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
    .btn:active{transform:scale(.96);opacity:.8}
    .btn.primary{background:var(--accent);color:#000;border-color:var(--accent);box-shadow:0 0 18px var(--accent-glow)}
    .btn.danger{background:var(--red);color:#fff;border-color:var(--red);box-shadow:0 0 16px rgba(239,68,68,.3)}
    .btn.success{background:var(--green);color:#000;border-color:var(--green)}
    .btn.small{padding:7px 12px;font-size:0.75rem;border-radius:14px}
    .btn.block{width:100%;margin:4px 0}
    .btn:disabled{opacity:.4;pointer-events:none}
    .big-score-btns{display:flex;gap:10px;margin:8px 0;flex-shrink:0}
    .big-point-btn{flex:1;min-height:120px;border-radius:22px;border:2px solid transparent;font-size:1.2rem;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all .1s;color:#fff;letter-spacing:.5px;position:relative}
    .big-point-btn:active{transform:scale(.94)}
    .big-point-btn.left{background:linear-gradient(135deg,#1e3a5f,#0f2744);border-color:var(--blue);box-shadow:0 0 25px rgba(59,130,246,.3)}
    .big-point-btn.right{background:linear-gradient(135deg,#3f1a1a,#270f0f);border-color:var(--red);box-shadow:0 0 25px rgba(239,68,68,.3)}
    .big-point-btn .label{font-size:.7rem;font-weight:500;opacity:.7;text-transform:uppercase;letter-spacing:1px}
    .scoreboard{display:flex;align-items:stretch;gap:6px;margin:8px 0;flex-shrink:0}
    .player-side{flex:1;background:var(--surface2);border-radius:var(--radius);padding:12px 6px;text-align:center;display:flex;flex-direction:column;gap:4px;transition:all .25s;border:2px solid transparent}
    .player-side.serving{border-color:var(--green);box-shadow:0 0 18px rgba(34,197,94,.3)}
    .player-side.winner{border-color:var(--gold);box-shadow:0 0 22px rgba(245,158,11,.4)}
    .player-name{font-size:.85rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;flex-wrap:wrap}
    .serve-dot{width:8px;height:8px;background:var(--green);border-radius:50%;display:inline-block;box-shadow:0 0 8px var(--green);animation:pulseDot 1.2s infinite;flex-shrink:0}
    @keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.8)}}
    .sets-display{font-size:1.6rem;font-weight:800;color:var(--accent)}
    .games-display{font-size:1rem;font-weight:700;background:rgba(255,255,255,.06);padding:3px 12px;border-radius:12px;display:inline-block;margin:0 auto}
    .points-display{font-size:2.2rem;font-weight:800;color:#fff;line-height:1;transition:transform .2s,color .2s}
    .points-display.pulse{animation:pointPulse .35s ease-out}
    @keyframes pointPulse{0%{transform:scale(1.4);color:var(--accent)}100%{transform:scale(1);color:#fff}}
    .vs-divider{display:flex;align-items:center;font-weight:800;color:var(--text2);font-size:1rem;flex-shrink:0;opacity:.5}
    .info-bar{display:flex;justify-content:space-between;align-items:center;gap:6px;flex-wrap:wrap;background:var(--surface2);border-radius:var(--radius-sm);padding:8px 12px;margin:6px 0;flex-shrink:0;font-size:.8rem}
    .stat-badge{background:rgba(255,255,255,.04);border-radius:8px;padding:6px 10px;font-size:.7rem;color:var(--text2);display:flex;align-items:center;gap:4px}
    .stat-badge strong{color:var(--accent)}
    .list-item{background:var(--surface2);border:1px solid transparent;border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;transition:all .15s}
    .list-item:active{border-color:var(--accent);box-shadow:0 0 12px var(--accent-glow)}
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:flex;justify-content:center;align-items:center;z-index:2000;animation:fadeIn .2s}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;max-width:90vw;width:360px;max-height:80vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.7);display:flex;flex-direction:column;gap:10px}
    .modal h4{color:var(--text);text-align:center;font-size:1.1rem}
    .modal button{background:var(--surface2);border:1px solid var(--border);padding:12px;border-radius:20px;font-weight:600;font-size:.9rem;cursor:pointer;color:var(--text)}
    .modal button.primary{background:var(--accent);color:#000;border-color:var(--accent)}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:10px 22px;border-radius:24px;font-weight:700;z-index:3000;animation:slideUp .3s;font-size:.85rem;box-shadow:0 8px 30px var(--accent-glow)}
    @keyframes slideUp{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translate(-50%,0)}}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:10px}
    .rating-delta{font-size:.75rem;font-weight:700;margin-left:3px}
    .rating-delta.up{color:var(--green)}
    .rating-delta.down{color:var(--red)}
    label{font-size:.78rem;color:var(--text2);font-weight:600;display:block;margin-top:8px;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
  </style>
</head>
<body>
<div class="app" id="appContainer">
  <div class="navbar" id="mainNav" style="display:none"></div>
  <!-- Роль -->

    <div style="display:flex;flex-direction:column;gap:16px;justify-content:center;align-items:center;flex:1">
      <button class="btn primary" style="padding:28px 32px;font-size:1.4rem;width:90%" id="btnJudge">👨‍⚖️ Судья</button>
      <button class="btn" style="padding:28px 32px;font-size:1.4rem;width:90%" id="btnSpectator">👀 Зритель</button>

  <!-- Судья: список -->

        <button class="big-point-btn right" id="btnPointRight"><span class="label">ОЧКО</span>🎾</button>

        <button id="btnServeMiss" class="btn small danger">❌</button>
      </div>
    </div>
  </div>
  <!-- Self: список -->
  <div class="screen" id="screen-self-list">
    <div class="card">
      <h3>🤝 Self матчи</h3>
      <div id="selfMatchList"></div>
      <button id="btnNewSelfMatch" class="btn primary block">➕ Новый матч</button>
      <button id="btnBackRoleSelf" class="btn block">↩ Сменить роль</button>

  </div>
  <!-- Self: создание -->
  <div class="screen" id="screen-self-setup">
    <div class="card">
      <h2>🎾 Self матч</h2>
      <label>Левый игрок</label>

      <label>Счёт (сеты через пробел, напр. 6:4 3:6 10:7)</label>
      <input id="inpScoreSelf" class="input" placeholder="6:4 3:6 10:7">
      <button id="btnCreateSelfMatch" class="btn primary block">Создать матч</button>
      <button id="btnBackSelfSetup" class="btn block">↩ К списку</button>
    </div>
  </div>
  <!-- Пользователи -->
  <div class="screen" id="screen-users">

  <!-- Лидерборд -->
  <div class="screen" id="screen-leaderboard">

      <div style="display:flex;gap:6px;margin-top:8px">

    </div>

  <!-- Поиск соперника -->
  <div class="screen" id="screen-find-match">
    <div class="card">
      <h3>🔍 Поиск соперника</h3>
      <div id="rivalList"></div>
      <button id="btnBackFindMatch" class="btn block">↩ Назад</button>
    </div>
  </div>
  <!-- Статистика игрока -->
  <div class="screen" id="screen-player-stats">
    <div class="card">
      <h3 id="playerStatsName"></h3>
      <div id="playerStatsContent"></div>
      <button id="btnBackPlayerStats" class="btn block">↩ Назад</button>
    </div>
  </div>
  <!-- Турниры -->
  <div class="screen" id="screen-tournaments">
    <div class="card">
      <h3>🏆 Турниры</h3>
      <div id="tournamentList"></div>
      <button id="btnCreateTournament" class="btn primary block">➕ Новый</button>
      <button id="btnBackFromTournaments" class="btn block">↩ Назад</button>

  <!-- Турнир детали -->
  <div class="screen" id="screen-tournament-detail">
    <div class="card">
      <button id="btnBackToTournamentList" class="btn small">↩ К списку</button>
      <h3 id="detailTournamentName"></h3>
      <div id="tournamentBracketContainer"></div>
      <button id="btnGenerateBracket" class="btn primary block" style="display:none">Сгенерировать сетку</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push, set, update, get, onValue, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCBX9b5aUvTxqUU7wCoLrSZj4iDQQMuOcY",
  authDomain: "tennislive-3d29d.firebaseapp.com",
  databaseURL: "https://tennislive-3d29d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tennislive-3d29d",
  storageBucket: "tennislive-3d29d.firebasestorage.app",
  messagingSenderId: "218839864905",
  appId: "1:218839864905:web:40c9f735f9111c02371198"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const $ = s => document.querySelector(s), $$ = s => document.querySelectorAll(s);

// ══════════════ Game Engine ══════════════
const GameEngine = (() => {
  const MODES = {
    single: { setsToWin: 2, gamesToWin: 6, tiebreakAt: 6, suddenDeathAfter: Infinity },
    double: { setsToWin: 2, gamesToWin: 6, tiebreakAt: 6, suddenDeathAfter: 0 },
    proam:  { setsToWin: 1, gamesToWin: 8, tiebreakAt: 8, suddenDeathAfter: 1 }
  };
  function getConfig(mode) { return MODES[mode] || MODES.single; }
  function fmtPoints(pts, isTb) {
    if (isTb) return [String(pts[0]), String(pts[1])];
    const [p0, p1] = pts;
    if (p0 >= 3 && p1 >= 3) return p0 === p1 ? ['40', '40'] : (p0 > p1 ? ['AD', '40'] : ['40', 'AD']);
    const map = ['0', '15', '30', '40'];
    return [map[Math.min(p0, 3)] || '40', map[Math.min(p1, 3)] || '40'];
  }
  function isGameWon(pts, isTb, cfg, deuceCount) {
    const [p0, p1] = pts;
    if (isTb) return (p0 >= 7 || p1 >= 7) && Math.abs(p0 - p1) >= 2;
    if (cfg.suddenDeathAfter === 0) return p0 >= 4 || p1 >= 4;
    if (p0 >= 3 && p1 >= 3) {
      if (deuceCount > cfg.suddenDeathAfter) return Math.abs(p0 - p1) === 1 && (p0 >= 4 || p1 >= 4);
      return (p0 >= 4 || p1 >= 4) && Math.abs(p0 - p1) >= 2;
    }
    return (p0 >= 4 || p1 >= 4) && Math.abs(p0 - p1) >= 2;
  }
  function isSetWon(games, cfg) {
    const [g0, g1] = games;
    return (g0 >= cfg.gamesToWin || g1 >= cfg.gamesToWin) && Math.abs(g0 - g1) >= 2;
  }
  function shouldTiebreak(games, cfg) {
    return games[0] === cfg.tiebreakAt && games[1] === cfg.tiebreakAt;
  }
  function processPoint(current, side) {
    const cfg = current.config || MODES.single;
    const cur = current.score.currentSet;
    const idx = side === 'left' ? 0 : 1;
    const ptsBefore = [cur.points[0], cur.points[1]];
    cur.points[idx]++;
    current.stats.totalPoints = (current.stats.totalPoints || 0) + 1;
    if (!current.history) current.history = [];
    current.history.push({
      action: 'point', side, ts: Date.now(),
      before: { sets: [...current.score.sets], games: [...cur.games], points: [...ptsBefore], isTiebreak: cur.isTiebreak, deuceCount: cur.deuceCount }
    });
    if (isGameWon(cur.points, cur.isTiebreak, cfg, cur.deuceCount)) {
      cur.games[idx]++;
      current.stats.totalGames = (current.stats.totalGames || 0) + 1;
      cur.points = [0, 0];
      cur.deuceCount = 0;
      cur.serveSide = cur.serveSide === 'left' ? 'right' : 'left';
      current.history.push({ action: 'game', side, ts: Date.now() });
      let setDone = false;
      if (cur.isTiebreak) {
        setDone = true;
        cur.isTiebreak = false;
      } else if (isSetWon(cur.games, cfg)) {
        setDone = true;
      } else if (shouldTiebreak(cur.games, cfg)) {
        cur.isTiebreak = true;
        cur.points = [0, 0];
      }
      if (setDone) {
        current.score.sets[idx]++;
        cur.games = [0, 0];
        cur.isTiebreak = false;
        current.history.push({ action: 'set', side, ts: Date.now() });
        if (current.score.sets[idx] >= cfg.setsToWin) {
          current.status.winner = side;
          current.status.phase = 'finished';
          current.history.push({ action: 'match', side });
        }
      }
    } else if (cur.points[0] >= 3 && cur.points[1] >= 3 && cur.points[0] === cur.points[1]) {
      cur.deuceCount = (cur.deuceCount || 0) + 1;
    }
    return current;
  }
  function undoLastAction(current) {
    if (!current || !current.history || !current.history.length) return current;
    let idx = -1;
    for (let i = current.history.length - 1; i >= 0; i--) if (current.history[i].action === 'point') { idx = i; break; }
    if (idx === -1) return current;
    const before = current.history[idx].before;
    if (!before) return current;
    current.score.sets = before.sets;
    current.score.currentSet.games = before.games;
    current.score.currentSet.points = before.points;
    current.score.currentSet.isTiebreak = before.isTiebreak;
    current.score.currentSet.deuceCount = before.deuceCount;
    current.stats.totalPoints = Math.max(0, (current.stats.totalPoints || 0) - 1);
    current.score.currentSet.serveSide = (before.games[0] + before.games[1]) % 2 === 0 ? 'left' : 'right';
    current.history = current.history.slice(0, idx);
    if (current.status.winner) { current.status.winner = null; current.status.phase = 'playing'; }
    return current;
  }
  function determineWinner(setsArr) {
    let l = 0, r = 0;
    setsArr.forEach(s => {
      const [p0, p1] = s.split(':').map(Number);
      if (p0 > p1) l++; else if (p1 > p0) r++;
    });
    return l > r ? 'left' : (r > l ? 'right' : null);
  }
  function validateSets(setsArr) {
    if (!setsArr || setsArr.length === 0) return { valid: false, msg: 'Введите счёт' };
    let l = 0, r = 0;
    for (let s of setsArr) {
      const parts = s.split(':');
      if (parts.length !== 2) return { valid: false, msg: `Неверный формат сета: ${s}` };
      const p0 = parseInt(parts[0]), p1 = parseInt(parts[1]);
      if (isNaN(p0) || isNaN(p1) || p0 < 0 || p1 < 0) return { valid: false, msg: `Числа >=0 в сете: ${s}` };
      if (p0 > p1) l++; else if (p1 > p0) r++;
    }
    if (l === r) return { valid: false, msg: 'Ничья по сетам' };
    return { valid: true, winner: l > r ? 'left' : 'right' };
  }
  return { MODES, getConfig, fmtPoints, isGameWon, processPoint, undoLastAction, otherSide: s => s === 'left' ? 'right' : 'left', determineWinner, validateSets };
})();

// ══════════════ Firebase Helpers ══════════════
const FB = {
  async syncMatchList(matchId, m) {
    if (!m || !matchId) return;
    const listEntry = {
      type: m.type || 'live',
      tournament: m.tournamentName || '',
      playerLeft: m.players.left.name,
      playerRight: m.players.right.name,
      scoreSummary: m.type === 'live'
        ? `${m.score.sets[0]}:${m.score.sets[1]} (${m.score.currentSet.games[0]}:${m.score.currentSet.games[1]})`
        : (m.score.sets.join(' ') || ''),
      phase: m.status.winner ? (m.type === 'self' ? 'confirmed' : 'finished') : m.status.phase,
      updatedAt: serverTimestamp(),
      creatorId: m.creatorId || null,
      leftUserId: m.players.left.userId || null,
      rightUserId: m.players.right.userId || null,
      confirmLeft: m.confirmLeft || false,
      confirmRight: m.confirmRight || false
    };
    await update(ref(db), { [`matchList/${matchId}`]: listEntry });
  },
  async applyRating(matchId, winnerSide) {
    const matchRef = ref(db, `matches/${matchId}`);
    try {
      const tres = await runTransaction(matchRef, cur => {
        if (!cur || cur.ratingApplied) return;
        cur.ratingApplied = true;
        return cur;
      });
      if (!tres.committed || !tres.snapshot.val()) return null;
      const m = tres.snapshot.val();
      const lUid = m.players.left?.userId, rUid = m.players.right?.userId;
      if (!lUid || !rUid) return null;
      const [lSnap, rSnap] = await Promise.all([
        get(ref(db, `users/${lUid}`)),
        get(ref(db, `users/${rUid}`))
      ]);
      const lu = lSnap.val(), ru = rSnap.val();
      if (!lu || !ru) return null;
      const lr = lu.rating || 1000, rr = ru.rating || 1000;
      const K = 32;
      const el = 1 / (1 + Math.pow(10, (rr - lr) / 400));
      const er = 1 / (1 + Math.pow(10, (lr - rr) / 400));
      const lRes = winnerSide === 'left' ? 1 : 0, rRes = winnerSide === 'right' ? 1 : 0;
      const nlr = Math.round(lr + K * (lRes - el));
      const nrr = Math.round(rr + K * (rRes - er));
      await Promise.all([
        runTransaction(ref(db, `users/${lUid}`), u => {
          if (!u) return u;
          u.rating = nlr;
          u.matchesPlayed = (u.matchesPlayed || 0) + 1;
          if (lRes === 1) u.wins = (u.wins || 0) + 1;
          else u.losses = (u.losses || 0) + 1;
          u.lastMatchAt = Date.now();
          return u;
        }),
        runTransaction(ref(db, `users/${rUid}`), u => {
          if (!u) return u;
          u.rating = nrr;
          u.matchesPlayed = (u.matchesPlayed || 0) + 1;
          if (rRes === 1) u.wins = (u.wins || 0) + 1;
          else u.losses = (u.losses || 0) + 1;
          u.lastMatchAt = Date.now();
          return u;
        })
      ]);
      const deltaL = nlr - lr, deltaR = nrr - rr;
      await update(matchRef, { ratingChanges: { left: deltaL, right: deltaR } });
      return { left: deltaL, right: deltaR, leftName: m.players.left.name, rightName: m.players.right.name };
    } catch (e) {
      console.error('Rating error', e);
      return null;
    }
  }
};

// ── Match actions (judge) ──
async function addPoint(side) {
  if (pointLock || !currentMatchId || currentRole !== 'judge') return;
  pointLock = true;
  const matchRef = ref(db, `matches/${currentMatchId}`);
  try {
    await runTransaction(matchRef, cur => {
      if (!cur || cur.status.winner || cur.status.phase === 'interrupted') return;
      return GameEngine.processPoint(cur, side);
    });
    const snap = await get(matchRef);
    const m = snap.val();
    if (m) {
      await FB.syncMatchList(currentMatchId, m);
      renderJudgeUI(m);
      lastPointSide = side;
      showServePrompt();
    }
  } catch (e) { showToast('Ошибка: ' + e.message); } finally { pointLock = false; }
}
function showServePrompt() {
  if (serveTimeout) clearTimeout(serveTimeout);
  $('#servePrompt').style.display = 'flex';
  serveTimeout = setTimeout(() => { $('#servePrompt').style.display = 'none'; lastPointSide = null; }, 8000);
}
async function recordServe(result) {
  if (!currentMatchId || !lastPointSide) return;
  const matchRef = ref(db, `matches/${currentMatchId}`);
  await runTransaction(matchRef, cur => {
    if (!cur) return;
    if (!cur.stats) cur.stats = { totalPoints: 0, totalGames: 0, firstServeIn: 0, firstServeTotal: 0 };
    cur.stats.firstServeTotal++;
    if (result === 'in') cur.stats.firstServeIn++;
    return cur;
  });
  const snap = await get(matchRef);
  const m = snap.val();
  if (m) { renderJudgeUI(m); await FB.syncMatchList(currentMatchId, m); }
  $('#servePrompt').style.display = 'none';
  lastPointSide = null;
  clearTimeout(serveTimeout);
}
async function undoLastPoint() {
  if (!currentMatchId) return;
  const matchRef = ref(db, `matches/${currentMatchId}`);
  await runTransaction(matchRef, cur => { if (!cur) return; return GameEngine.undoLastAction(cur); });
  const snap = await get(matchRef);
  const m = snap.val();
  if (m) { renderJudgeUI(m); await FB.syncMatchList(currentMatchId, m); }
}
async function endMatch() {
  if (!currentMatchId) return;
  const matchRef = ref(db, `matches/${currentMatchId}`);
  const snap = await get(matchRef);
  const m = snap.val();
  if (!m || !confirm('Завершить матч?')) return;
  const winner = m.status.winner || 'left';
  await update(matchRef, { 'status/phase': 'finished', 'status/winner': winner, finishedAt: serverTimestamp() });
  const updated = (await get(matchRef)).val();
  await FB.syncMatchList(currentMatchId, updated);
  const ratingRes = await FB.applyRating(currentMatchId, winner);
  if (ratingRes) showToast(`Рейтинг: ${ratingRes.leftName} ${ratingRes.left > 0 ? '+' : ''}${ratingRes.left}, ${ratingRes.rightName} ${ratingRes.right > 0 ? '+' : ''}${ratingRes.right}`);
  renderJudgeUI(updated);
}
async function interruptMatch() {
  if (!currentMatchId) return;
  const matchRef = ref(db, `matches/${currentMatchId}`);
  const snap = await get(matchRef);
  const m = snap.val();
  if (!m) return;
  if (m.status.phase === 'interrupted') {
    await update(matchRef, { 'status/phase': 'playing' });
    await FB.syncMatchList(currentMatchId, { ...m, status: { ...m.status, phase: 'playing' } });
  } else {
    if (!confirm('Прервать матч?')) return;
    await update(matchRef, { 'status/phase': 'interrupted' });
    await FB.syncMatchList(currentMatchId, { ...m, status: { ...m.status, phase: 'interrupted' } });
  }
}

async function confirmSelfMatch(matchId, side) {
  if (!currentUserId) return;
  const matchRef = ref(db, `matches/${matchId}`);
  let winner = null;
  await runTransaction(matchRef, cur => {
    if (!cur || cur.status.phase !== 'pending') return;
    if (side === 'left') { if (cur.players.left.userId !== currentUserId || cur.confirmLeft) return; cur.confirmLeft = true; }
    else { if (cur.players.right.userId !== currentUserId || cur.confirmRight) return; cur.confirmRight = true; }
    if (cur.confirmLeft && cur.confirmRight) {
      winner = GameEngine.determineWinner(cur.score.sets);
      cur.status.phase = 'confirmed';
      cur.status.winner = winner;
    }
    return cur;
  });
  const m = (await get(matchRef)).val();
  await FB.syncMatchList(matchId, m);
  if (winner) {
    await FB.applyRating(matchId, winner);
    showToast('Матч подтверждён');
  } else showToast('Подтверждение сохранено');
  subscribeSelfList();
}
async function createSelfMatch() {
  const lId = $('#selLeftPlayer').value, rId = $('#selRightPlayer').value;
  if (!lId || !rId || lId === rId) return showToast('Выберите разных игроков');
  const [lSnap, rSnap] = await Promise.all([get(ref(db, `users/${lId}`)), get(ref(db, `users/${rId}`))]);
  const l = lSnap.val(), r = rSnap.val();
  if (!l || !r) return showToast('Игрок не найден');
  const scoreStr = $('#inpScoreSelf').value.trim();
  const setsArr = scoreStr.split(/\s+/).filter(s => s).map(s => `${s.split(':')[0]}:${s.split(':')[1]}`);
  const validation = GameEngine.validateSets(setsArr);
  if (!validation.valid) return showToast(validation.msg);
  const mRef = push(ref(db, 'matches'));
  const id = mRef.key;
  const match = {
    id, type: 'self', tournamentId: '', tournamentName: 'Self', mode: 'single',

// ── Leaderboard ──
function subscribeLeaderboard(period = 'all') {
  clearListSub();
  Promise.all([get(ref(db, 'users')), get(ref(db, 'matches'))]).then(([uSnap, mSnap]) => {
    const users = uSnap.val() || {};
    const matches = Object.values(mSnap.val() || {}).filter(m =>
      (m.type === 'self' && m.status?.phase === 'confirmed') ||
      (m.type === 'live' && m.status?.phase === 'finished')
    );
    const now = Date.now(), wk = now - 7 * 86400000, mo = now - 30 * 86400000;
    const list = Object.entries(users).map(([id, u]) => {
      let wins = u.wins || 0, losses = u.losses || 0;
      if (period !== 'all') {
        const recent = matches.filter(m => {
          const t = m.finishedAt || m.createdAt || 0;
          return period === 'week' ? t > wk : t > mo;
        });
        wins = 0; losses = 0;
        recent.forEach(m => {
          if ((m.players.left.userId === id && m.status.winner === 'left') || (m.players.right.userId === id && m.status.winner === 'right')) wins++;
          else if (m.players.left.userId === id || m.players.right.userId === id) losses++;
        });
      }
      return { id, name: u.name, rating: u.rating || 1000, wins, losses };
    }).sort((a, b) => b.rating - a.rating).slice(0, 10);
    $('#leaderboardList').innerHTML = list.map((u, i) => `<div class="list-item" data-id="${u.id}"><span>${i + 1}. ${u.name}</span><span>${u.rating} (${u.wins}/${u.losses})</span></div>`).join('') || '<p style="color:var(--text2)">Нет данных</p>';
    $$('#leaderboardList .list-item').forEach(el => el.onclick = () => openPlayerStats(el.dataset.id));
  }).catch(e => console.error(e));
}

// ── Find match ──
function subscribeFindMatch() {
  clearListSub();
  get(ref(db, `users/${currentUserId}`)).then(snap => {
    const me = snap.val();
    if (!me) return;
    const myR = me.rating || 1000;
    onValue(ref(db, 'users'), snap => {
      const users = snap.val() || {};
      const rivals = Object.entries(users).filter(([id, u]) => id !== currentUserId && Math.abs((u.rating || 1000) - myR) <= 100);
      $('#rivalList').innerHTML = rivals.map(([id, u]) => `<div class="list-item"><span>${u.name} (${u.rating || 1000})</span><button class="btn small primary challenge-btn" data-id="${id}">Предложить</button></div>`).join('') || '<p style="color:var(--text2)">Нет подходящих</p>';
      $$('.challenge-btn').forEach(b => b.onclick = async (e) => { e.stopPropagation(); await proposeSelfMatch(b.dataset.id); });
    });
  });
}
async function proposeSelfMatch(rivalId) {
  if (!currentUserId) return;
  const [meSnap, rSnap] = await Promise.all([get(ref(db, `users/${currentUserId}`)), get(ref(db, `users/${rivalId}`))]);
  const me = meSnap.val(), rival = rSnap.val();
  if (!me || !rival) return;
  const mRef = push(ref(db, 'matches'));
  const id = mRef.key;
  const match = {
    id, type: 'self', tournamentId: '', tournamentName: 'Self', mode: 'single',
    players: { left: { name: me.name, userId: currentUserId }, right: { name: rival.name, userId: rivalId } },
    score: { sets: [] },
    status: { phase: 'pending', winner: null }, creatorId: currentUserId, ratingApplied: false,
    confirmLeft: true, confirmRight: false,
    stats: { totalPoints: 0, totalGames: 0, firstServeIn: 0, firstServeTotal: 0 },
    history: [], config: GameEngine.getConfig('single'), createdAt: serverTimestamp()
  };
  await set(mRef, match);
  await FB.syncMatchList(id, match);
  showToast('Предложение отправлено');
  showScreen('self-list');
}

// ── Player stats ──
function openPlayerStats(playerId) {
  get(ref(db, `users/${playerId}`)).then(s => {
    const u = s.val();
    if (!u) return;
    showScreen('player-stats');
    $('#playerStatsName').textContent = u.name;
    const wr = u.matchesPlayed > 0 ? Math.round((u.wins || 0) / u.matchesPlayed * 100) : 0;
    const lastMd = u.lastMatchAt ? new Date(u.lastMatchAt).toLocaleDateString() : '-';
    get(ref(db, 'matches')).then(mSnap => {
      const matches = Object.values(mSnap.val() || {}).filter(m =>
        (m.players.left.userId === playerId || m.players.right.userId === playerId) &&
        ((m.type === 'self' && m.status?.phase === 'confirmed') || (m.type === 'live' && m.status?.phase === 'finished'))
      );
      const lmHtml = matches.slice(0, 5).map(m => {
        const won = (m.status.winner === 'left' && m.players.left.userId === playerId) || (m.status.winner === 'right' && m.players.right.userId === playerId);
        return `<div style="margin:2px 0;padding:4px 8px;border-left:3px solid ${won ? 'var(--green)' : 'var(--red)'};font-size:.8rem">${m.players.left.name} vs ${m.players.right.name} ${m.score.sets.join(' ')}</div>`;
      }).join('');
      $('#playerStatsContent').innerHTML = `
        <p>Рейтинг: <strong style="color:var(--accent)">${u.rating || 1000}</strong></p>
        <p>Матчей: ${u.matchesPlayed || 0} | Побед: ${u.wins || 0} | Поражений: ${u.losses || 0}</p>
        <p>Winrate: ${wr}%</p>
        <p>Последняя игра: ${lastMd}</p>
        <h4 style="margin-top:8px">Последние матчи</h4>${lmHtml || '<p style="color:var(--text2)">Нет завершённых матчей</p>'}
      `;
    });
  });
}

// ── Tournaments ──
function subscribeTournaments() {

    $$('#tournamentList .list-item').forEach(el => el.onclick = () => openTournament(el.dataset.id, tours[el.dataset.id]));

function openTournament(id, tour) {
  clearTournamentDetailSub();
  showScreen('tournament-detail');
  $('#detailTournamentName').textContent = tour.name;
  $('#btnGenerateBracket').style.display = 'none';
  unsubTournamentDetail = onValue(ref(db, 'matches'), snap => {
    const matches = Object.entries(snap.val() || {}).filter(([_, m]) => m.tournamentId === id && m.type === 'live');
    if (matches.length === 0 && tour.type === 'single_elim') {
      $('#btnGenerateBracket').style.display = 'block';
      $('#btnGenerateBracket').onclick = () => generateBracket(id);
    } else {
      $('#btnGenerateBracket').style.display = 'none';
    }
    const byRound = {};
    matches.forEach(([mid, m]) => {
      const r = m.round || 'Финал';
      if (!byRound[r]) byRound[r] = [];
      byRound[r].push({ id: mid, m });
    });
    let html = '';
    Object.keys(byRound).sort().forEach(r => {
      html += `<h4 style="margin-top:8px">${r}</h4>`;
      byRound[r].forEach(({ id, m }) => {
        html += `<div class="list-item">${m.players.left.name} vs ${m.players.right.name} ${m.score.sets.length ? m.score.sets.join(':') : ''}</div>`;
      });
    });
    $('#tournamentBracketContainer').innerHTML = html || '<p style="color:var(--text2)">Нет матчей</p>';
  });
}
async function generateBracket(tournamentId) {
  const uSnap = await get(ref(db, 'users'));
  const users = uSnap.val() || {};
  const items = Object.entries(users).map(([id, u]) => ({ id, name: u.name }));
  if (items.length < 2) return showToast('Мало игроков');
  const selected = await selectPlayersForBracket(items);
  if (!selected || selected.length < 2) return;
  let players = selected.map(p => ({ id: p.id, name: p.name }));
  while (players.length % 2 !== 0) players.push({ id: null, name: 'BYE' });
  let round = 1, current = players;
  while (current.length > 1) {
    const pairs = [];
    for (let i = 0; i < current.length; i += 2) pairs.push({ left: current[i], right: current[i + 1] });
    for (let pair of pairs) {
      const mRef = push(ref(db, 'matches'));
      const mId = mRef.key;
      const cfg = GameEngine.getConfig('single');
      const match = {
        id: mId, type: 'live', tournamentId, tournamentName: 'Турнир', mode: 'single',
        players: { left: { name: pair.left.name, userId: pair.left.id }, right: { name: pair.right.name, userId: pair.right.id } },
        score: { sets: [0, 0], currentSet: { games: [0, 0], points: [0, 0], serveSide: 'left', isTiebreak: false, deuceCount: 0 } },
        status: { phase: 'playing', winner: null },
        stats: { totalPoints: 0, totalGames: 0, firstServeIn: 0, firstServeTotal: 0 },
        history: [], config: { ...cfg }, ratingApplied: false,
        round: `Раунд ${round}`, createdAt: serverTimestamp()
      };
      await set(mRef, match);
      await FB.syncMatchList(mId, match);
    }
    current = new Array(current.length / 2).fill(0).map(() => ({ id: null, name: 'TBD' }));
    round++;
  }
  showToast('Сетка создана');
  const tour = (await get(ref(db, `tournaments/${tournamentId}`))).val();
  if (tour) openTournament(tournamentId, tour);
}
function selectPlayersForBracket(items) {
  return new Promise(resolve => {
    const overlay = document.createElement('div'); overlay.className = 'modal-overlay';
    const modal = document.createElement('div'); modal.className = 'modal';
    modal.innerHTML = `<h4>Выберите игроков</h4><div id="bracketPlayerList"></div><button class="btn primary block" id="confirmBracketPlayers">ОК</button><button class="btn block" id="cancelBracket">Отмена</button>`;
    const listDiv = modal.querySelector('#bracketPlayerList');
    items.forEach(p => {
      const lb = document.createElement('label'); lb.style.display = 'block';
      lb.innerHTML = `<input type="checkbox" value="${p.id}"> ${p.name}`;
      listDiv.appendChild(lb);
    });
    overlay.appendChild(modal); document.body.appendChild(overlay);
    modal.querySelector('#confirmBracketPlayers').onclick = () => {
      const checked = [...listDiv.querySelectorAll('input:checked')].map(inp => items.find(i => i.id === inp.value));
      document.body.removeChild(overlay);
      resolve(checked);
    };
    modal.querySelector('#cancelBracket').onclick = () => { document.body.removeChild(overlay); resolve(null); };
    overlay.addEventListener('click', e => { if (e.target === overlay) { document.body.removeChild(overlay); resolve(null); } });
  });
}

// ── History ──
function subscribeHistory() {
  clearListSub();
  unsubList = onValue(ref(db, 'matches'), snap => {
    const all = snap.val() || {};
    const finished = Object.entries(all)
      .filter(([_, m]) => (m.type === 'live' && m.status?.phase === 'finished') || (m.type === 'self' && m.status?.phase === 'confirmed'))
      .sort((a, b) => (b[1].finishedAt || b[1].createdAt || 0) - (a[1].finishedAt || a[1].createdAt || 0));
    $('#historyList').innerHTML = finished.map(([id, m]) => {
      const wt = m.status.winner ? `🏆${m.status.winner === 'left' ? m.players.left.name : m.players.right.name}` : '';
      return `<div class="list-item"><div>${m.players.left.name} vs ${m.players.right.name}</div><div>${m.score.sets.join(' ')} ${wt}</div></div>`;
    }).join('') || '<p style="color:var(--text2)">Нет завершённых</p>';
  });
}
